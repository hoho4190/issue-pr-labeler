# See: https://prettier.io/docs/en/configuration

printWidth: 100
tabWidth: 2
useTabs: false
semi: false
singleQuote: true
quoteProps: as-needed
jsxSingleQuote: false
trailingComma: none
bracketSpacing: true
bracketSameLine: true
arrowParens: always
proseWrap: always
htmlWhitespaceSensitivity: css
endOfLine: lf
overrides:
  - files:
      - '*.md'
    options:
      printWidth: 120
  - files:
      - '*.json'
      - '*.jsonc'
    options:
      printWidth: 120
  - files:
      - '*.yml'
      - '*.yaml'
    options:
      printWidth: 120
