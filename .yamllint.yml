# See: https://yamllint.readthedocs.io/en/stable/

extends: default

rules:
  document-end: disable
  document-start:
    level: warning
    present: false
  line-length:
    level: warning
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  comments:
    min-spaces-from-content: 1
  truthy:
    check-keys: false

ignore:
  - THIRD_PARTY_LICENSES/
  - .licenses/
  - dist/
  - node_modules/
  - coverage/
  - tmp/
