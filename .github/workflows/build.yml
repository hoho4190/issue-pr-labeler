name: '🏗️ Build'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v6 # → permissions: contents: read
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: npm run test:ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Set environment variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # for `gh api`
        # `gh api` → permissions: pull-requests: read
        run: |
          bash .github/scripts/build/set-env.sh

      - name: Set up Git user from pusher info
        if: ${{ env.IS_RELEASE_BRANCH_MERGE == 'true' }}
        env:
          PUSHER_EMAIL: ${{ github.event.pusher.email }}
          PUSHER_NAME: ${{ github.event.pusher.name }}
        run: |
          git config --global user.email "$PUSHER_EMAIL"
          git config --global user.name "$PUSHER_NAME"

      - name: Create and push new tag
        if: ${{ env.IS_RELEASE_BRANCH_MERGE == 'true' }}
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GIT_PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `git push` → permissions: contents: write
        run: |
          source .github/scripts/utils/git-util.sh
          git tag -- "$RELEASE_TAG"
          git_with_auth push origin "refs/tags/$RELEASE_TAG"
