name: ✨ Feature request
description: Suggest an idea for this project
title: '[Feature] '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value:
        "\U0001F44B Thanks for suggesting a new feature! Please fill out the form below to help us understand your idea
        clearly.\n"
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you currently using?
      placeholder: e.g., v1.0.0
    validations:
      required: true
  - type: input
    id: feature-summary
    attributes:
      label: Feature Summary
      description: Briefly describe the feature you’d like to request.
      placeholder: e.g., Add dark mode to the UI
    validations:
      required: true
  - type: textarea
    id: feature-description
    attributes:
      label: Description
      description: Provide a detailed explanation of the feature and its purpose.
      placeholder: Explain what the feature does and why it would be useful.
    validations:
      required: true
